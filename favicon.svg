<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 배경 라운드 박스 (스카이블루) -->
  <rect width="100" height="100" rx="24" fill="#bae6fd" />
  
  <!-- 배경 장식용 노란 별 (반투명) -->
  <polygon points="50,15 59,38 84,38 64,53 72,76 50,61 28,76 36,53 16,38 41,38" fill="#fbbf24" opacity="0.3"/>
  
  <!-- 빨간 복싱 글러브 -->
  <!-- 엄지손가락 -->
  <circle cx="38" cy="52" r="12" fill="#ef4444" stroke="#b91c1c" stroke-width="4"/>
  <!-- 주먹 메인 -->
  <circle cx="56" cy="46" r="22" fill="#ef4444" stroke="#b91c1c" stroke-width="4"/>
  <!-- 흰색 손목 밴드 -->
  <rect x="42" y="62" width="28" height="10" rx="3" fill="#ffffff" stroke="#b91c1c" stroke-width="3" transform="rotate(-15 56 67)"/>
  
  <!-- 데코레이션 미니 황금 별 -->
  <polygon points="80,18 83,25 90,25 85,29 87,36 80,32 73,36 75,29 70,25 77,25" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
</svg>
